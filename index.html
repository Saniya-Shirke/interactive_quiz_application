<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="quiz-container">

    <h1>JavaScript Quiz</h1>

    <div id="question">
      Question appears here
    </div>

    <div class="options">

      <button class="optionBtn-1">Option 1</button>
      <button class="optionBtn-2">Option 2</button>
      <button class="optionBtn-3">Option 3</button>
      <button class="optionBtn-4">Option 4</button>

    </div>

    <button id="nextBtn">Next Question</button>

    <div id="score">
      Score: 0
    </div>

  </div>
<script src="script.js"></script>
</body>
</html>
